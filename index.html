<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School RPG Game</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <main id="app" class="app" aria-live="polite">
      <section id="opening" class="opening-screen" aria-label="オープニング">
        <img
          id="openingImage"
          class="opening-image"
          src="assets/images/ui/Opening.png"
          alt="Opening"
        />
      </section>

      <section id="nextScreen" class="next-screen" aria-label="次の画面">
        <img
          id="titleImage"
          class="title-image"
          src="assets/images/ui/Title.png"
          alt="Title"
        />
        <button id="matchingButton" class="matching-button" type="button" aria-label="マッチング開始">
          <img src="assets/images/ui/Matching_Button.png" alt="マッチング" />
        </button>
        <div id="battleScene" class="battle-scene" aria-label="バトルシーン">
          <img
            class="battle-character battle-character--player"
            src="assets/images/characters/player_default.png"
            alt="プレイヤー"
          />
          <img
            class="battle-character battle-character--opponent"
            src="assets/images/characters/opponent_default.png"
            alt="相手"
          />
          <div class="battle-actions" aria-label="技アイコン">
            <img src="assets/images/ui/Icon/Battle_Icon/recover_icon.png" alt="リカバー" />
            <img src="assets/images/ui/Icon/Battle_Icon/guard_icon.png" alt="ガード" />
            <img src="assets/images/ui/Icon/Battle_Icon/burst_icon.png" alt="バースト" />
            <img src="assets/images/ui/Icon/Battle_Icon/attack_icon.png" alt="アタック" />
          </div>
        </div>
      </section>

      <div id="fadeOverlay" class="fade-overlay" aria-hidden="true"></div>
    </main>

    <audio id="openingAudio" src="assets/audio/Opening.mp3" preload="auto"></audio>
  </body>
</html>
