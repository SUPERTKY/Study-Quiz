name = "study-quiz-pages"
pages_build_output_dir = "."
compatibility_date = "2026-07-20"

# Pages Functions cannot create Durable Object classes directly.
# This binding connects /api/session to the separate Durable Object Worker
# configured in wrangler.session-do.toml. Without script_name, Cloudflare Pages
# leaves env.GAME_SESSION_DO unset and the app falls back to KV/in-memory state.
[[durable_objects.bindings]]
name = "GAME_SESSION_DO"
class_name = "MyDurableObject"
script_name = "study-quiz-session-do"
